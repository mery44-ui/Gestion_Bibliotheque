{% extends 'base.html' %}
{% block content %}

<h4 class="mb-4">🔍 Rechercher un livre</h4>

<form method="GET" class="mb-4">
    <div class="input-group">
        <input type="text" name="q" class="form-control" 
               placeholder="Titre, auteur..." value="{{ query }}">
        <button class="btn btn-primary">Rechercher</button>
    </div>
</form>

<table class="table table-hover">
    <thead class="table-dark">
        <tr>
            <th>Titre</th>
            <th>Auteur</th>
            <th>Catégorie</th>
            <th>Disponibilité</th>
        </tr>
    </thead>
    <tbody>
    {% for livre in livres %}
    <tr>
        <td>{{ livre.titre }}</td>
        <td>{{ livre.auteur }}</td>
        <td>{{ livre.categorie }}</td>
        <td>
            {% if livre.disponible %}
                <span class="badge bg-success">Disponible</span>
            {% else %}
                <span class="badge bg-danger">Emprunté</span>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
