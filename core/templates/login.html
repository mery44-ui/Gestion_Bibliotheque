<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Bibliothèque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        body { background: #0C447C; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
        .login-logo { text-align: center; margin-bottom: 28px; }
        .login-logo i { font-size: 40px; color: #0C447C; }
        .login-title { font-size: 20px; font-weight: 500; color: #042C53; text-align: center; margin-bottom: 4px; }
        .login-sub { font-size: 13px; color: #888780; text-align: center; margin-bottom: 28px; }
        .form-label { font-size: 13px; color: #444441; font-weight: 500; }
        .form-control { border-radius: 8px; border: 0.5px solid #D3D1C7; padding: 10px 14px; font-size: 14px; }
        .form-control:focus { border-color: #185FA5; box-shadow: 0 0 0 3px rgba(24,95,165,0.1); }
        .btn-login { background: #0C447C; color: #fff; border: none; border-radius: 8px; padding: 12px; width: 100%; font-size: 15px; font-weight: 500; margin-top: 8px; }
        .btn-login:hover { background: #185FA5; color: #fff; }
        .alert-error { background: #FCEBEB; color: #A32D2D; border: none; border-radius: 8px; font-size: 13px; padding: 10px 14px; margin-bottom: 16px; }
        .alert-blocked { background: #FAEEDA; color: #854F0B; border: none; border-radius: 8px; font-size: 13px; padding: 10px 14px; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <i class="ti ti-books"></i>
    </div>
    <div class="login-title">Bibliothèque Universitaire</div>
    <div class="login-sub">Connectez-vous à votre espace</div>

    {% if messages %}
        {% for message in messages %}
            <div class="{% if 'bloqué' in message.tags %}alert-blocked{% else %}alert-error{% endif %}">
                <i class="ti ti-alert-circle"></i> {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="/login/">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Login</label>
            <input type="text" name="login" class="form-control" placeholder="Votre identifiant" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" name="password" class="form-control" placeholder="Votre mot de passe" required>
        </div>
        <button type="submit" class="btn-login">
            <i class="ti ti-login"></i> Se connecter
        </button>
    </form>
</div>
</body>
</html>
