<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bibliothèque Universitaire — Mot de passe oublié</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; }

    .left-panel {
      flex: 1;
      background: linear-gradient(135deg, rgba(30,34,53,0.85), rgba(79,126,248,0.7)),
                  url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200') center/cover no-repeat;
      display: flex; flex-direction: column;
      justify-content: center; padding: 60px 50px;
      color: #fff;
    }
    .left-logo {
      display: flex; align-items: center; gap: 12px;
      font-size: 1.8rem; font-weight: 800; margin-bottom: 40px;
    }
    .left-logo i {
      background: rgba(255,255,255,0.15);
      border-radius: 12px; padding: 10px;
      font-size: 1.4rem;
    }
    .quote {
      font-style: italic; font-size: 1.1rem;
      border-left: 3px solid rgba(255,255,255,0.4);
      padding-left: 16px; margin-bottom: 30px;
      opacity: 0.9; line-height: 1.6;
    }

    .right-panel {
      width: 420px; min-width: 380px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 36px;
    }
    .login-card { width: 100%; }
    .login-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .login-header .icon {
      background: #eff6ff; border-radius: 10px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      color: #4f7ef8; font-size: 1.1rem;
    }
    .login-header h2 { font-size: 1.1rem; font-weight: 700; margin: 0; }
    .login-header p { font-size: 0.75rem; color: #6b7280; margin: 0; }

    .form-group { margin-bottom: 18px; }
    .form-label { font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; display: block; }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); color: #9ca3af; font-size: 0.9rem;
    }
    .input-wrap input {
      width: 100%; padding: 10px 12px 10px 36px;
      border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 0.88rem; outline: none;
      transition: border 0.2s;
    }
    .input-wrap input:focus {
      border-color: #4f7ef8;
      box-shadow: 0 0 0 3px rgba(79,126,248,0.1);
    }

    .btn-login {
      width: 100%; padding: 11px;
      background: #4f7ef8; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.92rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: #3b6fe8; }

    .alert-msg {
      padding: 10px 14px; border-radius: 8px;
      font-size: 0.82rem; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .alert-err { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    
    .back-link {
      display: block; text-align: center; margin-top: 20px;
      font-size: 0.82rem; color: #6b7280; text-decoration: none;
    }
    .back-link:hover { color: #4f7ef8; }
  </style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="left-panel">
  <div class="left-logo">
    <i class="fa-solid fa-book-open-reader"></i>
    Bibliothèque Universitaire
  </div>
  <div class="quote">"Sécurisez et réinitialisez votre mot de passe en quelques instants."</div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="login-card">
    <div class="login-header">
      <div class="icon"><i class="fa-solid fa-key"></i></div>
      <div>
        <h2>Mot de passe oublié</h2>
        <p>Entrez vos informations</p>
      </div>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert-msg alert-err">
          <i class="fa-solid fa-circle-xmark"></i> {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST" action="/mot-de-passe-oublie/">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label">Identifiant (Login) *</label>
        <div class="input-wrap">
          <i class="fa-regular fa-user"></i>
          <input type="text" name="login" placeholder="Votre identifiant" required/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Adresse email *</label>
        <div class="input-wrap">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" name="email" placeholder="votre.email@exemple.com" required/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Question secrète : Quel est votre CIN ? *</label>
        <div class="input-wrap">
          <i class="fa-solid fa-id-card"></i>
          <input type="text" name="cin" placeholder="Votre réponse (CIN)" required/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Nouveau mot de passe *</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" name="nouveau_mdp" placeholder="Au moins 4 caractères" required/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirmer le nouveau mot de passe *</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" name="confirmer_mdp" placeholder="Confirmer le nouveau mot de passe" required/>
        </div>
      </div>

      <button type="submit" class="btn-login">
        Réinitialiser le mot de passe <i class="fa-solid fa-check"></i>
      </button>
    </form>

    <a href="/login/" class="back-link">
      <i class="fa-solid fa-arrow-left"></i> Retour à la connexion
    </a>

  </div>
</div>

</body>
</html>
